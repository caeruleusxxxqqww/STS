# ============================================================
# ============================================================


dataset:
  common:
    NAME: S3DIS
    data_root: data/S3DIS/s3disfull
    test_area: 5
    voxel_size: 0.04

  train:
    split: train
    presample: False  

  val:
    split: val
    presample: True  
    voxel_max: null   

  test:
    split: test
    presample: False
    voxel_max: null

feature_keys: x,heights

# ============================================================
# ============================================================
zero_shot:
  enabled: True
  source_dataset: ScanNet
  target_dataset: S3DIS
  source_num_classes: 20
  target_num_classes: 13
  aggregation: max

num_classes: 13

model:
  NAME: BaseSeg
  encoder_args:
    NAME: PointNextEncoder
    blocks: [1, 4, 7, 4, 4] 
    strides: [1, 4, 4, 4, 4]
    sa_layers: 1
    sa_use_res: False 
    width: 64 
    in_channels: 4
    expansion: 4
    radius: 0.1
    nsample: 32 
    aggr_args:
      feature_type: 'dp_fj'
      reduction: 'max'
    group_args:
      NAME: 'ballquery'
      normalize_dp: True
    conv_args:
      order: conv-norm-act
    act_args:
      act: 'relu'
    norm_args:
      norm: 'bn'
  decoder_args:
    NAME: PointNextDecoder
  cls_args:
    NAME: SegHead
    num_classes: 20
    in_channels: null
    norm_args:
      norm: 'bn'

batch_size: 1
val_batch_size: 1
